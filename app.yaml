# Cloud Run service definition.
# Deploy with:
#   gcloud run services replace app.yaml --region=us-central1
#
# Replace IMAGE_URL with a fully-qualified Artifact Registry image reference, e.g.:
#   us-central1-docker.pkg.dev/YOUR_PROJECT_ID/sturdy-broccoli/app:latest
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sturdy-broccoli
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 80
      containers:
        - image: IMAGE_URL
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
            # OPENAI_API_KEY is injected from Secret Manager at runtime.
            # Ensure the secret exists before deploying:
            #   gcloud secrets create OPENAI_API_KEY --data-file=-
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
