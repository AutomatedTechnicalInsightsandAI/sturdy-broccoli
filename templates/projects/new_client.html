{% extends 'base.html' %}
{% block title %}New Client — Sturdy Broccoli{% endblock %}
{% block page_title %}New Client{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header"><h6 class="mb-0">Add New Client</h6></div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Business Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required placeholder="e.g., Smith Plumbing LLC">
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label">Business Type</label>
              <input type="text" name="business_type" class="form-control" placeholder="e.g., plumber">
            </div>
            <div class="col">
              <label class="form-label">Niche</label>
              <input type="text" name="niche" class="form-control" placeholder="e.g., residential plumbing">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" placeholder="e.g., Austin, TX">
          </div>
          <div class="mb-3">
            <label class="form-label">Target Keywords</label>
            <input type="text" name="target_keywords" class="form-control" placeholder="e.g., plumber Austin, drain cleaning">
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label">Phone</label>
              <input type="tel" name="phone" class="form-control">
            </div>
            <div class="col">
              <label class="form-label">Website</label>
              <input type="url" name="website" class="form-control" placeholder="https://...">
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Add Client</button>
            <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
