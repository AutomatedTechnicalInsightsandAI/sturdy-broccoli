{% extends 'base.html' %}
{% block title %}New Project — Sturdy Broccoli{% endblock %}
{% block page_title %}New Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header"><h6 class="mb-0">Create New Project</h6></div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Client <span class="text-danger">*</span></label>
            <select name="client_id" class="form-select" required>
              <option value="">Select a client…</option>
              {% for client in clients %}
              <option value="{{ client.id }}">{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Project Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required placeholder="e.g., Main Website SEO">
          </div>
          <div class="mb-3">
            <label class="form-label">WordPress URL</label>
            <input type="url" name="wp_url" class="form-control" placeholder="https://yoursite.com">
          </div>
          <div class="mb-3">
            <label class="form-label">WP Username</label>
            <input type="text" name="wp_username" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">WP Application Password</label>
            <input type="password" name="wp_app_password" class="form-control">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Create Project</button>
            <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
