{% extends 'base.html' %}
{% block title %}Edit {{ project.name }} — Sturdy Broccoli{% endblock %}
{% block page_title %}Edit Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header"><h6 class="mb-0">Edit: {{ project.name }}</h6></div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Project Name</label>
            <input type="text" name="name" class="form-control" value="{{ project.name }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">WordPress URL</label>
            <input type="url" name="wp_url" class="form-control" value="{{ project.wp_url or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">WP Username</label>
            <input type="text" name="wp_username" class="form-control" value="{{ project.wp_username or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">WP Application Password</label>
            <input type="password" name="wp_app_password" class="form-control">
            <div class="form-text">Leave blank to keep existing password.</div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('projects.project_detail', project_id=project.id) }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
